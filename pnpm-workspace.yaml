packages:
  - apps/*
  - packages/*
  - tests/*
  - tooling/*

catalogs:
  # ===== BUILD TOOLS =====
  build:
    tsdown: ^0.22.0

  # ===== DEVELOPMENT TOOLS =====
  dev:
    # Git Hooks & Development Workflow
    lefthook: ^2.1.6

    # TypeScript & Compilation
    "@types/node": 24.12.3
    typescript: 6.0.3
    vitest: 4.1.5

  # ===== LINTING & FORMATTING =====
  lint:
    # Biome (ESLint/Prettier Alternative)
    "@biomejs/biome": 2.4.15

    # Commit Linting
    "@commitlint/cli": ^21.0.0
    "@commitlint/config-conventional": ^21.0.0
    "@commitlint/types": ^21.0.0

  # ===== MONOREPO =====
  monorepo:
    turbo: ^2.9.12

  # ===== NODE.JS ENVIRONMENT =====
  node:
    # CLI Framework
    "@clack/prompts": 1.4.0
    "@clack/core": 1.3.0

    # Color Utilities
    picocolors: ^1.1.1

  # ===== EFFECT =====
  effect:
    effect: ^3.21.2
    "@effect/platform": ^0.96.1
    "@effect/platform-node": ^0.106.0

nodeLinker: hoisted
linkWorkspacePackages: true

allowBuilds:
  "@parcel/watcher": true
  msgpackr-extract: true
  lefthook: true
  esbuild: true
