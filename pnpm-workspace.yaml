packages:
  - apps/*
  - packages/*
  - tooling/*

catalogs:
  # ===== BUILD TOOLS =====
  build:
    tsdown: ^0.21.7

  # ===== DEVELOPMENT TOOLS =====
  dev:
    # Git Hooks & Development Workflow
    lefthook: ^2.1.5

    # TypeScript & Compilation
    "@types/node": 24.12.2
    typescript: 6.0.2
    vitest: 4.1.4

  # ===== LINTING & FORMATTING =====
  lint:
    # Biome (ESLint/Prettier Alternative)
    "@biomejs/biome": 2.4.13

    # Commit Linting
    "@commitlint/cli": ^20.5.0
    "@commitlint/config-conventional": ^20.5.0
    "@commitlint/types": ^20.5.0

  # ===== MONOREPO =====
  monorepo:
    turbo: ^2.9.5

  # ===== NODE.JS ENVIRONMENT =====
  node:
    # CLI Framework
    "@clack/prompts": 1.2.0
    "@clack/core": 1.2.0

    # Color Utilities
    picocolors: ^1.1.1

  # ===== EFFECT =====
  effect:
    effect: ^3.21.0
    "@effect/platform": ^0.96.0
    "@effect/platform-node": ^0.106.0

nodeLinker: hoisted
linkWorkspacePackages: true

onlyBuiltDependencies:
  - "@parcel/watcher"
  - msgpackr-extract
  - lefthook
  - esbuild
