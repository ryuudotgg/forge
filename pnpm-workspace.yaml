packages:
  - apps/*
  - packages/*
  - tests/*
  - tooling/*

catalogs:
  # ===== BUILD TOOLS =====
  build:
    tsdown: ^0.22.9

  # ===== DEVELOPMENT TOOLS =====
  dev:
    # Git Hooks & Development Workflow
    lefthook: ^2.1.10

    # TypeScript & Compilation
    "@types/node": 24.13.2
    typescript: 7.0.2
    vitest: 4.1.10
    "@vitest/coverage-v8": 4.1.10

  # ===== LINTING & FORMATTING =====
  lint:
    # Biome (ESLint/Prettier Alternative)
    "@biomejs/biome": 2.5.2

    # Commit Linting
    "@commitlint/cli": ^21.2.0
    "@commitlint/config-conventional": ^21.2.0
    "@commitlint/types": ^21.2.0
    sherif: ^1.11.1

  # ===== MONOREPO =====
  monorepo:
    turbo: ^2.10.4

  # ===== NODE.JS ENVIRONMENT =====
  node:
    # CLI Framework
    "@clack/prompts": 1.7.0
    "@clack/core": 1.4.3

    # Color Utilities
    picocolors: ^1.1.1

  # ===== EFFECT =====
  effect:
    effect: ^3.21.4
    "@effect/platform": ^0.96.2
    "@effect/platform-node": ^0.107.0
    "@effect/tsgo": ^0.23.0

nodeLinker: hoisted
linkWorkspacePackages: true
minimumReleaseAge: 1440 # 24 Hours

allowBuilds:
  "@parcel/watcher": true
  msgpackr-extract: true
  lefthook: true
  esbuild: true
