packages:
  - apps/*
  - packages/*
  - tooling/*

catalogs:
  # ===== BUILD TOOLS =====
  build:
    tsdown: ^0.21.7

  # ===== DEVELOPMENT TOOLS =====
  dev:
    # Git Hooks & Development Workflow
    lefthook: ^2.1.4

    # TypeScript & Compilation
    typescript: 6.0.2
    "@types/node": 24.12.0

  # ===== LINTING & FORMATTING =====
  lint:
    # Biome (ESLint/Prettier Alternative)
    "@biomejs/biome": 2.4.10

    # Commit Linting
    "@commitlint/cli": ^20.5.0
    "@commitlint/config-conventional": ^20.5.0
    "@commitlint/types": ^20.5.0

  # ===== MONOREPO =====
  monorepo:
    turbo: ^2.9.1

  # ===== NODE.JS ENVIRONMENT =====
  node:
    # CLI Framework
    "@clack/prompts": 1.1.0
    "@clack/core": 1.1.0

    # Color Utilities
    picocolors: ^1.1.1

  # ===== UTILITIES =====
  utils:
    # Validation
    zod: ^4.3.6

nodeLinker: hoisted
linkWorkspacePackages: true

onlyBuiltDependencies:
  - lefthook
