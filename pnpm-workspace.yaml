packages:
  - apps/*
  - packages/*
  - tests/*
  - tooling/*

catalogs:
  # ===== BUILD TOOLS =====
  build:
    tsdown: ^0.22.3

  # ===== DEVELOPMENT TOOLS =====
  dev:
    # Git Hooks & Development Workflow
    lefthook: ^2.1.9

    # TypeScript & Compilation
    "@types/node": 24.13.2
    typescript: 6.0.3
    vitest: 4.1.9
    "@vitest/coverage-v8": 4.1.9

  # ===== LINTING & FORMATTING =====
  lint:
    # Biome (ESLint/Prettier Alternative)
    "@biomejs/biome": 2.5.1

    # Commit Linting
    "@commitlint/cli": ^21.1.0
    "@commitlint/config-conventional": ^21.1.0
    "@commitlint/types": ^21.1.0

  # ===== MONOREPO =====
  monorepo:
    turbo: ^2.10.1

  # ===== NODE.JS ENVIRONMENT =====
  node:
    # CLI Framework
    "@clack/prompts": 1.5.1
    "@clack/core": 1.4.1

    # Color Utilities
    picocolors: ^1.1.1

  # ===== EFFECT =====
  effect:
    effect: ^3.21.4
    "@effect/platform": ^0.96.2
    "@effect/platform-node": ^0.107.0
    "@effect/language-service": ^0.86.2

nodeLinker: hoisted
linkWorkspacePackages: true
minimumReleaseAge: 1440 # 24 Hours

allowBuilds:
  "@parcel/watcher": true
  msgpackr-extract: true
  lefthook: true
  esbuild: true
