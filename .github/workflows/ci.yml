name: CI

on:
  pull_request:
    branches: ["*"]

  push:
    branches: ["main"]

  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_COLOR: 3
  DO_NOT_TRACK: true

  # https://turborepo.org/docs/core-concepts/remote-caching
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  check:
    name: Code Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup
        uses: ./tooling/github/setup

      - name: Lint / Format
        run: pnpm check && pnpm check:ws

  typecheck:
    name: Type Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup
        uses: ./tooling/github/setup

      - name: Type Check
        run: pnpm typecheck

  tests:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./tooling/github/setup

      - name: Test & Measure Coverage
        run: pnpm test:coverage

      - name: Temper Report
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        run: node tooling/temper/report.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  scenarios:
    name: Scenarios
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup
        uses: ./tooling/github/setup

      - name: Test
        run: pnpm test --filter=@ryuujs/scenarios
