name: CI

on:
  pull_request:
    branches: ["*"]

  push:
    branches: ["main"]

  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_COLOR: 3
  DO_NOT_TRACK: true

  # https://turborepo.org/docs/core-concepts/remote-caching
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  check:
    name: Code Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup
        uses: ./tooling/github/setup

      - name: Lint / Format
        run: pnpm check && pnpm check:ws

  typecheck:
    name: Type Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup
        uses: ./tooling/github/setup

      - name: Type Check
        run: pnpm typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2 # We probe test all PMs.

      - name: Setup
        uses: ./tooling/github/setup

      - name: Test
        run: pnpm test

  temper:
    name: Temper Report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./tooling/github/setup

      - name: Measure Coverage
        run: pnpm test:coverage

      - name: Temper Report
        if: ${{ !cancelled() }} # Narrate even when thresholds fail the run.
        run: node scripts/temper-report.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
