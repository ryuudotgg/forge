name: Smoke

on:
  push:
    branches: ["main"]

  pull_request:
    paths:
      - "packages/cli/**"
      - "packages/core/**"
      - "packages/generators/**"
      - "!packages/*/tests/**"
      - "pnpm-lock.yaml"
      - "tests/scenarios/src/scenarios/install.smoke.test.ts"
      - "tests/scenarios/src/utils/**"

  schedule:
    - cron: "0 4 * * *"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_COLOR: 3
  DO_NOT_TRACK: true

  # https://turborepo.org/docs/core-concepts/remote-caching
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  smoke:
    name: Install Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup
        uses: ./tooling/github/setup

      - name: Build CLI
        run: pnpm build --filter=@ryuujs/forge

      - name: Smoke Test
        run: pnpm --filter @ryuujs/scenarios exec vitest run src/scenarios/install.smoke.test.ts
        env:
          FORGE_SMOKE: "1"

      - name: Multi-PM Smoke
        if: ${{ github.event_name != 'pull_request' }}
        run: pnpm --filter @ryuujs/scenarios exec vitest run src/scenarios/multi-pm.smoke.test.ts
        env:
          FORGE_SMOKE: "1"
