name: "Setup & Install"
description: "Setup & Install"

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: "package.json"

    - uses: actions/setup-node@v6
      with:
        node-version-file: ".nvmrc"

    - name: Install Dependencies
      shell: bash
      run: bun install --frozen-lockfile
