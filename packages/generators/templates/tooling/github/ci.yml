name: CI

on:
  pull_request:
    branches: ["*"]

  push:
    branches: ["main"]

  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_COLOR: 3
  DO_NOT_TRACK: true

  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: ./tooling/github/setup

      - name: Format & Lint
        run: __CHECK_COMMAND__

      - name: Lint Workspace
        run: __CHECK_WS_COMMAND__

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: ./tooling/github/setup

      - name: Type Check
        run: __TYPECHECK_COMMAND__
